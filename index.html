<!DOCTYPE html>
<html>
<head>
    <title>Drowsy AI Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; transition: 0.5s; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .sys-info { font-size: 0.8rem; color: #888; margin-bottom: 20px; }
        .online { color: #2ecc71; font-weight: bold; }
        .offline { color: #e74c3c; font-weight: bold; }

        .badge { padding: 20px 50px; border-radius: 50px; font-weight: bold; font-size: 2rem; display: inline-block; margin: 20px 0; border: 4px solid transparent; }
        .SAFE { border-color: #2ecc71; color: #2ecc71; }
        .DANGER { background: #e74c3c; color: white; box-shadow: 0 0 30px #ff0000; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .layout { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        .box { flex: 1; background: #1e1e1e; padding: 20px; border-radius: 15px; min-width: 300px; }
        img { width: 100%; border-radius: 10px; border: 2px solid #333; }

        table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 0.9rem; }
        th { border-bottom: 2px solid #333; padding: 10px; color: #888; }
        td { padding: 10px; border-bottom: 1px solid #222; }
        .img-link { color: #0078ff; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart Driver Monitoring</h1>
    <div class="sys-info">Hardware Status: <span id="sys-stat" class="offline">CHECKING...</span></div>

    <div id="status-badge" class="badge SAFE">CONNECTING...</div>

    <div class="layout">
        <div class="box">
            <h3>Latest Danger Capture</h3>
            <img id="latest-img" src="https://via.placeholder.com/400x300?text=No+Alerts+Yet">
            <p id="alert-time" style="color:#888; margin-top:10px;">--</p>
        </div>

        <div class="box" style="max-height: 500px; overflow-y: auto;">
            <h3>Alert History Log</h3>
            <table>
                <thead><tr><th>Time</th><th>EAR</th><th>Link</th></tr></thead>
                <tbody id="history-rows"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://drowsydriver-eff03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. LIVE STATUS MONITOR
    db.ref('driver_status').on('value', (snap) => {
        const val = snap.val();
        if (!val) return;

        // UI Update
        const badge = document.getElementById('status-badge');
        badge.innerText = val.status || "SAFE";
        badge.className = "badge " + (val.status === "DANGER" ? "DANGER" : "SAFE");

        // Hardware Ping Check
        const sys = document.getElementById('sys-stat');
        const isOnline = (Date.now() / 1000) - val.last_ping < 15;
        sys.innerText = isOnline ? "ONLINE" : "OFFLINE";
        sys.className = isOnline ? "online" : "offline";

        // Update Image only if it's a real alert
        if (val.status === "DANGER" && val.last_alert_image) {
            document.getElementById('latest-img').src = val.last_alert_image;
            document.getElementById('alert-time').innerText = val.timestamp;
        }
    });

    // 2. HISTORY TABLE MONITOR
    db.ref('alerts_history').limitToLast(10).on('value', (snap) => {
        const container = document.getElementById('history-rows');
        container.innerHTML = "";
        let rows = [];
        snap.forEach(child => {
            const a = child.val();
            rows.unshift(`<tr>
                <td>${a.timestamp.split(' ')[3]}</td>
                <td>${a.ear}</td>
                <td><a href="${a.image_url}" target="_blank" class="img-link">View</a></td>
            </tr>`);
        });
        container.innerHTML = rows.join('');
    });
</script>
</body>
</html>
